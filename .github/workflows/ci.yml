name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier les fichiers
        run: |
          echo "Vérification des fichiers..."
          ls -la app/
          test -f app/index.html && echo "index.html existe"
          
  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t mon-site:latest .
          docker images
      - name: Test Docker container
        run: |
          docker run --rm -d -p 8080:80 --name test mon-site:latest
          sleep 5
          curl --fail http://localhost:8080 || exit 1
          docker stop test
